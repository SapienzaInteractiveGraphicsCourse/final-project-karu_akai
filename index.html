<!doctype html>
<html lang="eng">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive 3D Portfolio</title>
  </head>

  <body>
    <canvas id="webgl"></canvas>

    <div id="loading-screen">
      <p>Cleaning the room...</p>
    </div>

    <button id="reset-view" type="button" aria-label="Reset camera view">
      Reset view
    </button>

    <div
      id="section-panel"
      role="dialog"
      aria-labelledby="section-panel-title"
      aria-live="polite"
    >
      <button id="close-panel" type="button" aria-label="Close panel">
        ×
      </button>

      <div id="panel-page-layout">
        <button
          id="previous-panel-page"
          class="panel-page-arrow panel-page-arrow-previous"
          type="button"
          aria-label="Previous page"
          hidden
        >
          <span class="sr-only">Previous page</span>
        </button>

        <div id="panel-content">
          <p class="panel-kicker">Interactive CV</p>

          <h2 id="section-panel-title">Welcome</h2>

          <p id="section-panel-text">
            Click on the elements inside the case to explore the portfolio.
          </p>
        </div>

        <button
          id="next-panel-page"
          class="panel-page-arrow panel-page-arrow-next"
          type="button"
          aria-label="Next page"
        >
          <span class="sr-only">Next page</span>
        </button>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
