<!doctype html>
<html lang="eng">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive 3D Portfolio</title>
  </head>

  <body>
    <canvas id="webgl"></canvas>

    <div id="loading-screen">
      <p>Loading portfolio...</p>
    </div>

    <button id="reset-view" type="button" aria-label="Reset camera view">
      Reset view
    </button>

    <div id="section-panel">
      <button id="close-panel" aria-label="Close panel">×</button>
      <p class="panel-kicker">Interactive CV</p>
      <h2>Welcome</h2>
      <p>
        Click on the elements inside the case to explore the portfolio.
      </p>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
